set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g base-index 0
set -g mouse on
set -g status-keys vi
setw -g mode-keys vi

set -g prefix C-b
bind-key C-b send-prefix

# Pane splits should open to the same path as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Status bar readability ──────────────────────────────
set -g status-style "bg=colour236,fg=colour250"
set -g status-left  " #[bold]#S #[default]"
set -g status-left-length 30

# Inactive windows: dim
set -g window-status-style "fg=colour244,bg=colour236"
set -g window-status-format " #I:#W#F "

# ACTIVE window: bold, bright, colored block — the key readability win
set -g window-status-current-style "fg=colour16,bg=colour39,bold"
set -g window-status-current-format " #I:#W#F "

# Clock/host on the right, bold
set -g status-right "#[bold]#H  %H:%M "
set -g status-right-length 40
set -g status-interval 5

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect' # use prefix ctrl-s to save and ctrl-r to restore
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
